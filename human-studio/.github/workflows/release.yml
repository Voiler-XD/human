name: Release Human Studio

on:
  push:
    tags:
      - 'studio-v*'

permissions:
  contents: write

jobs:
  build-cli:
    name: Build Human CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build CLI binaries
        run: |
          cd human-studio
          bash scripts/build-cli.sh

      - uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: human-studio/resources/bin/

  build-studio:
    name: Build ${{ matrix.os }}
    needs: build-cli
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: win
          - os: ubuntu-latest
            target: linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: human-studio/resources/bin/

      - name: Install dependencies
        working-directory: human-studio
        run: npm ci

      - name: Build renderer
        working-directory: human-studio
        run: npm run build:renderer

      - name: Package (${{ matrix.target }})
        working-directory: human-studio
        run: npm run package:${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: human-studio/release/*.*
